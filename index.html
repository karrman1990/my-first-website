<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
}

header h1 {
    color: #38bdf8;
}

.container {
    padding: 20px;
}

.section {
    background: #1e293b;
    margin: 20px 0;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    color: #38bdf8;
}

.skills span {
    display: inline-block;
    background: #334155;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
}

.project {
    margin-top: 10px;
}

a {
    color: #38bdf8;
    text-decoration: none;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    margin-top: 30px;
}

@media (max-width: 600px) {
    header h1 {
        font-size: 22px;
    }
}
</style>

</head>

<body>

<header>
    <h1>👨‍💻 My Portfolio</h1>
    <p>Future Web Developer 🚀</p>
</header>

<div class="container">

    <div class="section">
        <h2>About Me</h2>
        <p>I am a motivated beginner learning web development and building real projects.</p>
    </div>

    <div class="section skills">
        <h2>My Skills</h2>
        <span>HTML</span>
        <span>CSS</span>
        <span>GitHub</span>
    </div>

    <div class="section">
        <h2>My Projects</h2>
        <div class="project">
            <p>🌐 My First Website</p>
            <a href="#">View Project</a>
        </div>
    </div>

    <div class="section">
        <h2>Contact</h2>
        <p>Email: your@email.com</p>
    </div>

</div>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
